name: "Build Debezium Quarkus Runtime Extension"
description: "Builds the Debezium Runtime Extension"

inputs:
  maven-cache-key:
    description: "The maven build cache key"
    required: true
  shell:
    description: "The shell to use"
    required: false
    default: bash
  distribution:
    description: "The Java distribution to use"
    required: false
    default: "graalvm"
  maven-props:
    description: "Maven properties"
    required: true
  connector:
    description: "The connector"
    required: true
  multi-engine-timeout:
    description: "Multi engine timeout"
    required: false
    default: "100"


runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/setup-java
      with:
        distribution: ${{ inputs.distribution }}
    - uses: ./.github/actions/maven-cache
      with:
        key: ${{ inputs.maven-cache-key }}
    - name: Build Parent
      shell: ${{ inputs.shell }}
      run: >
        ./mvnw clean install -DskipITs -DskipTests -B
    - name: Build Debezium Quarkus Extensions
      shell: ${{ inputs.shell }}
      run: >
        ./mvnw install -B -pl :debezium-quarkus-${{ inputs.connector }}-parent -am -amd -D${{ inputs.maven-props }} -D${{ inputs.multi-engine-timeout }}